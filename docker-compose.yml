services:
  app:
    image: ${APP_NAME}:${APP_VERSION}
    container_name: ${APP_NAME}
    expose:
      - "${APP_PORT}"
    env_file:
      - .env
    networks:
      - app-network
    environment:
      AWS_REGION: us-east-1
      SQS_ATIVO_ALTERADO_URL: https://sqs.us-east-1.amazonaws.com/266087050047/ativo-alterado.fifo
      SQS_OPERACAO_REGISTRADA_URL: https://sqs.us-east-1.amazonaws.com/266087050047/operacao-registrada.fifo
    restart: always

networks:
  app-network:
    external: true
